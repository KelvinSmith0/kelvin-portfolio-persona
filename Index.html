<style>
/* ============ RESET + BASE ============ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img,svg{max-width:100%;display:block;}

:root{
  --accent:#FF4D2E;
  --accent-2:#FFB800;
  --bg:#000;
  --card:#0d0d0d;
  --card-2:#141414;
  --border:#1c1c1c;
  --text:#fff;
  --muted:#888;
  --radius:18px;
  --radius-lg:24px;
}

.container{width:90%;max-width:1200px;margin:0 auto;}

/* ============ NAV ============ */
nav{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;padding:18px 0;transition:padding .3s;}
.nav-content{display:flex;justify-content:space-between;align-items:center;gap:20px;}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-.5px;}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;letter-spacing:-1px;color:#000;}
.nav-links{display:flex;gap:30px;align-items:center;}
.nav-links a{color:#aaa;font-size:14px;font-weight:500;transition:color .2s;}
.nav-links a:hover{color:#fff;}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;font-size:14px;transition:transform .2s,box-shadow .2s,background .2s;white-space:nowrap;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,77,46,.4);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:#fff;}
.btn-ghost:hover{background:#1c1c1c;box-shadow:none;}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
@media(max-width:900px){.nav-links{display:none;}}

/* ============ HERO ============ */
.hero{min-height:100vh;padding:140px 0 60px;position:relative;display:flex;align-items:center;overflow:hidden;}
.hero::before,.hero::after{content:"";position:absolute;border-radius:50%;filter:blur(120px);opacity:.5;pointer-events:none;}
.hero::before{width:500px;height:500px;background:var(--accent);top:-200px;left:-150px;animation:float1 18s ease-in-out infinite;}
.hero::after{width:600px;height:600px;background:var(--accent-2);bottom:-300px;right:-200px;opacity:.25;animation:float2 22s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(80px,40px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(-60px,-40px);}}
.hero-inner{position:relative;z-index:2;width:100%;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,77,46,.1);border:1px solid rgba(255,77,46,.3);padding:8px 16px;border-radius:30px;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:30px;}
.hero-badge .pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.3);}}
h1{font-size:clamp(44px,8vw,96px);line-height:1;letter-spacing:-3px;font-weight:900;margin-bottom:30px;}
h1 .gradient{background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
h1 .stroke{-webkit-text-stroke:1.5px #fff;color:transparent;}
.hero-sub{font-size:clamp(17px,2vw,21px);color:#aaa;max-width:640px;margin-bottom:40px;line-height:1.5;}
.hero-buttons{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:60px;}
.hero-stats{display:flex;gap:50px;flex-wrap:wrap;}
.hero-stat strong{display:block;font-size:36px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero-stat span{color:#888;font-size:13px;text-transform:uppercase;letter-spacing:1px;}

.marquee{padding:30px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:60px;overflow:hidden;position:relative;}
.marquee::before,.marquee::after{content:"";position:absolute;top:0;width:100px;height:100%;z-index:2;pointer-events:none;}
.marquee::before{left:0;background:linear-gradient(90deg,#000,transparent);}
.marquee::after{right:0;background:linear-gradient(-90deg,#000,transparent);}
.marquee-track{display:flex;gap:60px;animation:marquee 30s linear infinite;width:max-content;}
.marquee-track span{font-size:28px;font-weight:800;letter-spacing:-1px;color:#fff;display:flex;align-items:center;gap:60px;white-space:nowrap;}
.marquee-track span::after{content:"✦";color:var(--accent);font-size:18px;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ============ SECTION BASE ============ */
section{padding:100px 0;position:relative;}
.section-head{margin-bottom:60px;max-width:700px;}
.section-tag{display:inline-block;color:var(--accent);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}
.section-title{font-size:clamp(32px,5vw,56px);letter-spacing:-1.5px;font-weight:900;line-height:1.05;margin-bottom:18px;}
.section-sub{color:#aaa;font-size:18px;line-height:1.6;}

/* ============ ABOUT ============ */
.about-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:center;}
.about-visual{aspect-ratio:1/1;max-width:400px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--accent),var(--accent-2));position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(255,77,46,.2);}
.about-visual img{width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1;}
.about-visual::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.4));z-index:2;pointer-events:none;}
.about-content h2{font-size:clamp(32px,4vw,48px);letter-spacing:-1.5px;font-weight:900;margin-bottom:24px;line-height:1.1;}
.about-content p{color:#aaa;font-size:17px;margin-bottom:18px;}
.about-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:30px;}
.tag{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:30px;font-size:13px;color:#ccc;}
@media(max-width:900px){.about-grid{grid-template-columns:1fr;gap:40px;}}

/* ============ SERVICES ============ */
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.service{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 30px;transition:transform .3s,border-color .3s,background .3s;position:relative;overflow:hidden;cursor:pointer;}
.service::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.service:hover{transform:translateY(-6px);border-color:#2a2a2a;background:var(--card-2);}
.service:hover::before{transform:scaleX(1);}
.service-icon{width:56px;height:56px;background:rgba(255,77,46,.1);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:background .3s;}
.service:hover .service-icon{background:rgba(255,77,46,.2);}
.service-icon svg{width:26px;height:26px;stroke:var(--accent);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.service h3{font-size:22px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px;}
.service p{color:#aaa;font-size:15px;line-height:1.6;margin-bottom:18px;}
.service .arrow{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:13px;font-weight:700;letter-spacing:.5px;transition:gap .2s;}
.service:hover .arrow{gap:12px;}
@media(max-width:900px){.services-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.services-grid{grid-template-columns:1fr;}}

/* ============ STATS STRIP ============ */
.stats-strip{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:50px;display:grid;grid-template-columns:repeat(4,1fr);gap:30px;text-align:center;}
.stat-num{font-size:clamp(40px,5vw,64px);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
.stat-label{color:#888;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;margin-top:8px;}
@media(max-width:768px){.stats-strip{grid-template-columns:1fr 1fr;gap:40px;}}

/* ============ PORTFOLIO ============ */
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.work{position:relative;aspect-ratio:4/3;border-radius:var(--radius-lg);overflow:hidden;background:var(--card-2);cursor:pointer;border:1px solid var(--border);}
.work-thumb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:900;letter-spacing:-3px;color:rgba(255,255,255,.06);}
.work-thumb.w1{background:linear-gradient(135deg,#FF4D2E,#FFB800);}
.work-thumb.w2{background:linear-gradient(135deg,#0EA5E9,#8B5CF6);}
.work-thumb.w3{background:linear-gradient(135deg,#10B981,#0EA5E9);}
.work-thumb.w4{background:linear-gradient(135deg,#F59E0B,#EF4444);}
.work-thumb.w5{background:linear-gradient(135deg,#8B5CF6,#EC4899);}
.work-thumb.w6{background:linear-gradient(135deg,#06B6D4,#10B981);}
.work-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.95));padding:24px;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;transition:opacity .3s;}
.work:hover .work-overlay{opacity:1;}
.work-cat{color:var(--accent);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.work h3{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.work-thumb-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:900;letter-spacing:-3px;color:rgba(255,255,255,.15);z-index:1;}
@media(max-width:900px){.portfolio-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.portfolio-grid{grid-template-columns:1fr;}}

/* ============ PROCESS ============ */
.process{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.step{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 26px;position:relative;}
.step-num{font-size:14px;font-weight:800;color:var(--accent);letter-spacing:1px;margin-bottom:18px;}
.step h3{font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-.5px;}
.step p{color:#aaa;font-size:14px;line-height:1.6;}
@media(max-width:900px){.process{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.process{grid-template-columns:1fr;}}

/* ============ PRICING ============ */
.pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.plan{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;position:relative;transition:transform .3s,border-color .3s;}
.plan:hover{transform:translateY(-4px);border-color:#2a2a2a;}
.plan.featured{border-color:var(--accent);background:linear-gradient(180deg,rgba(255,77,46,.05),var(--card));}
.plan.featured::before{content:"Most Popular";position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.plan-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;margin-bottom:18px;}
.plan-price{font-size:54px;font-weight:900;letter-spacing:-2px;margin-bottom:6px;line-height:1;}
.plan-price small{font-size:14px;font-weight:500;color:#888;letter-spacing:0;}
.plan-desc{color:#aaa;font-size:14px;margin-bottom:28px;}
.plan ul{list-style:none;margin-bottom:32px;}
.plan li{padding:10px 0;font-size:15px;color:#ccc;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a1a;}
.plan li:last-child{border-bottom:none;}
.plan li::before{content:"✓";color:var(--accent);font-weight:800;}
.plan-btn{width:100%;justify-content:center;}
@media(max-width:900px){.pricing{grid-template-columns:1fr;max-width:420px;margin:0 auto;}}

/* ============ TESTIMONIALS ============ */
.testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.t-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;}
.t-stars{color:#FFB800;font-size:16px;letter-spacing:2px;margin-bottom:18px;}
.t-text{color:#ddd;font-size:16px;line-height:1.7;margin-bottom:24px;}
.t-author{display:flex;align-items:center;gap:14px;}
.t-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:18px;}
.t-name{font-size:15px;font-weight:700;}
.t-role{color:#888;font-size:13px;}
@media(max-width:900px){.testimonials{grid-template-columns:1fr;}}

/* ============ FAQ ============ */
.faq-list{display:flex;flex-direction:column;gap:14px;max-width:820px;margin:0 auto;}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.faq-item.open{border-color:#2a2a2a;}
.faq-q{padding:22px 26px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:16px;user-select:none;gap:20px;}
.faq-q .plus{font-size:24px;color:var(--accent);font-weight:300;transition:transform .3s;flex-shrink:0;}
.faq-item.open .plus{transform:rotate(45deg);}
.faq-a{padding:0 26px;max-height:0;color:#aaa;line-height:1.7;font-size:15px;overflow:hidden;transition:max-height .3s ease,padding .3s ease;}
.faq-item.open .faq-a{padding:0 26px 22px;max-height:400px;}

/* ============ CONTACT ============ */
.contact-wrap{display:grid;grid-template-columns:1fr 1.3fr;gap:60px;align-items:start;}
.contact-info{padding:40px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);}
.contact-info h3{font-size:24px;font-weight:800;margin-bottom:14px;letter-spacing:-.5px;}
.contact-info > p{color:#aaa;margin-bottom:30px;font-size:15px;line-height:1.6;}
.contact-item{display:flex;gap:14px;align-items:flex-start;margin-bottom:22px;}
.contact-item-icon{width:42px;height:42px;background:rgba(255,77,46,.12);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.contact-item-icon svg{width:20px;height:20px;stroke:var(--accent);stroke-width:2;fill:none;}
.contact-item-label{color:#888;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.contact-item-value{color:#fff;font-size:15px;font-weight:600;word-break:break-all;}
.contact-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;min-height:500px;position:relative;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:13px;font-weight:600;color:#ccc;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:14px 16px;background:#0a0a0a;border:1px solid var(--border);border-radius:12px;color:#fff;font-family:inherit;font-size:15px;transition:border-color .2s,box-shadow .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,77,46,.1);}
.form-group textarea{min-height:130px;resize:vertical;}
.form-submit{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:20px;flex-wrap:wrap;}
.form-note{color:#888;font-size:13px;max-width:300px;}
@media(max-width:900px){.contact-wrap{grid-template-columns:1fr;gap:30px;}.form-grid{grid-template-columns:1fr;}.form-submit{flex-direction:column;align-items:stretch;}}

/* ============ 🚀 ROCKET SUCCESS ANIMATION ============ */
.rocket-stage{position:relative;width:100%;max-width:280px;height:300px;margin:0 auto 10px;overflow:visible;}
.stars-field{position:absolute;inset:0;pointer-events:none;z-index:1;}
.star{position:absolute;color:#FFB800;font-size:14px;animation:twinkle 2s ease-in-out infinite;text-shadow:0 0 8px rgba(255,184,0,.6);}
.star.s1{top:8%;left:15%;animation-delay:0s;font-size:18px;}
.star.s2{top:18%;right:12%;animation-delay:.3s;}
.star.s3{top:35%;left:8%;animation-delay:.6s;font-size:20px;}
.star.s4{top:30%;right:22%;animation-delay:.9s;}
.star.s5{top:60%;left:18%;animation-delay:1.2s;font-size:12px;}
.star.s6{top:55%;right:18%;animation-delay:1.5s;}
.star.s7{top:80%;left:30%;animation-delay:.4s;font-size:16px;}
.star.s8{top:75%;right:30%;animation-delay:1.1s;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.4);}}

.rocket-wrap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:3;animation:rocketLaunch 3.2s cubic-bezier(.4,.0,.2,1) forwards;}
.rocket{width:80px;height:160px;position:relative;animation:rocketShake .8s ease-in-out infinite;animation-delay:0s;}

@keyframes rocketShake{0%,100%{transform:translateX(0) translateY(0);}25%{transform:translateX(-1.5px) translateY(0);}50%{transform:translateX(0) translateY(1px);}75%{transform:translateX(1.5px) translateY(0);}}
@keyframes rocketLaunch{0%{transform:translateX(-50%) translateY(0);}8%{transform:translateX(-50%) translateY(0) translateX(-3px);}16%{transform:translateX(-50%) translateY(0) translateX(3px);}25%{transform:translateX(-50%) translateY(0) translateX(-2px);}33%{transform:translateX(-50%) translateY(-30px);}100%{transform:translateX(-50%) translateY(-450px);opacity:0;}}

.flame{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:30px;height:0;background:linear-gradient(to top,#FF4D2E 0%,#FFB800 50%,rgba(255,184,0,.4) 80%,transparent 100%);border-radius:50% 50% 30% 30% / 40% 40% 60% 60%;filter:blur(2px);animation:flameIgnite 3.2s ease-out forwards;}
.flame-inner{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%);width:18px;height:0;background:linear-gradient(to top,#fff 0%,#FFB800 50%,transparent 100%);border-radius:50%;filter:blur(1px);animation:flameIgnite 3.2s ease-out forwards;animation-delay:.05s;}
@keyframes flameIgnite{0%,20%{height:0;opacity:0;}30%{height:40px;opacity:1;}60%{height:90px;opacity:1;}100%{height:140px;opacity:.7;}}

.smoke-cloud{position:absolute;bottom:-30px;left:50%;width:50px;height:50px;background:radial-gradient(circle,rgba(200,200,210,.4) 0%,rgba(150,150,160,.2) 40%,transparent 70%);border-radius:50%;op
